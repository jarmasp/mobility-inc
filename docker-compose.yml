services:
  payments:
    build:
      context: ./payments
    environment:
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - mobility-net

  driver:
    build:
      context: ./driver
    environment:
      SERVER_PORT: "8080"
      PAYMENTS_URL: "http://payments:8081"
    ports:
      - "8080:8080"
    depends_on:
      payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - mobility-net

  rider:
    build:
      context: ./rider
    environment:
      PORT: "3000"
      PAYMENTS_URL: "http://payments:8081"
      DRIVER_URL: "http://driver:8080"
    ports:
      - "3000:3000"
    depends_on:
      payments:
        condition: service_healthy
      driver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      - mobility-net

networks:
  mobility-net:
    name: mobility-net
