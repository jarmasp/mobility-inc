spring.application.name=driver-service
server.port=${SERVER_PORT:8080}
payments.grpc-url=${PAYMENTS_GRPC_URL:payments:50051}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/driver}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
jwt.secret=${JWT_SECRET}
auth.stub=${AUTH_STUB:false}
auth.google.client-id=${GOOGLE_CLIENT_ID:}
auth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
auth.google.callback-url=${GOOGLE_CALLBACK_URL:http://localhost:8080/auth/google/callback}
smtp.from=${SMTP_FROM:no-reply@mobility.local}
spring.mail.host=${SMTP_HOST:mailpit}
spring.mail.port=${SMTP_PORT:1025}
